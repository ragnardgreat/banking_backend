services:
  - type: web
    name: banking-backend
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: banking-db
          property: connectionString
    dependsOn:
      - banking-db

  - type: pserv
    name: banking-db
    runtime: postgres15
    plan: standard
    ipAllowList: []
    envVars:
      - key: POSTGRES_DB
        value: banking
      - key: POSTGRES_USER
        value: banking
      - key: POSTGRES_PASSWORD
        generateValue: true
