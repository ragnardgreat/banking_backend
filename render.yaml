services:
  # Backend Java application
  - type: web
    name: banking-backend
    runtime: docker
    plan: standard
    healthCheckPath: /swagger-ui.html
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: banking-db
          property: connectionString
      - key: PORT
        value: "8080"

  # PostgreSQL database
  - type: pserv
    name: banking-db
    runtime: postgres15
    plan: standard
    ipAllowList: []
    envVars:
      - key: POSTGRES_DB
        value: banking
      - key: POSTGRES_USER
        value: banking
      - key: POSTGRES_PASSWORD
        generateValue: true
