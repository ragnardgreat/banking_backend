services:
  # Backend Java application
  - type: web
    name: banking-backend
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8080"
    dependsOn:
      - banking-db

  # PostgreSQL database
  - type: pserv
    name: banking-db
    runtime: postgres15
    plan: standard
    ipAllowList: []
    envVars:
      - key: POSTGRES_DB
        value: banking
      - key: POSTGRES_USER
        value: banking
      - key: POSTGRES_PASSWORD
        generateValue: true
